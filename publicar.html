<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publicar Estadía - EstadiTech</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header class="site-header">
    <div class="logos">
      <img src="logoutzac.png" alt="Logo UTZAC">
      <img src="estaditechlogo.png" alt="Logo EstadiTech">
    </div>
    <button class="nav-toggle" aria-label="Abrir menú" aria-expanded="false"><span></span></button>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="vacantes.html">Vacantes</a>
      <a href="publicar.html">Publicar estadía</a>
      <a href="progreso.html">Progreso</a>
      <a href="login.html">Login</a>
      <a href="registro.html" class="nav-cta">Registrarme</a>
    </nav>
  </header>

  <div class="slogan"><span>Buscamos talentos UTZAC y los canalizamos con empresas</span></div>

  <main class="centrado">
    <div class="card card-centrada">
      <div class="pagina-header" style="margin-bottom:18px;">
        <h1 style="font-size:24px;">Publicar estadía</h1>
        <p>Comparte tus oportunidades con los estudiantes</p>
      </div>

      <div class="campo">
        <label for="puesto">Puesto</label>
        <input type="text" id="puesto" placeholder="Ej. Desarrollador Web, Asistente Administrativo">
      </div>

      <div class="campo">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" placeholder="Describe las actividades que el estudiante realizará" rows="4"></textarea>
      </div>

      <div class="campo">
        <label for="carrera">Carrera solicitada</label>
        <select id="carrera">
          <option value="administracion">Administración de empresas</option>
          <option value="agricultura">Agricultura</option>
          <option value="contaduria">Contaduría</option>
          <option value="educacion">Educación</option>
          <option value="energia">Energía y Desarrollo Sostenible</option>
          <option value="fisioterapia">Fisioterapia</option>
          <option value="industrial">Ingeniería Industrial</option>
          <option value="mantenimiento">Mantenimiento Industrial</option>
          <option value="mecatronica">Mecatrónica</option>
          <option value="mineria">Minería</option>
          <option value="mercadotecnia">Negocios y Mercadotecnia</option>
          <option value="TI">Tecnologías de la Información</option>
        </select>
      </div>

      <div class="campo">
        <label for="lugares">Lugares disponibles</label>
        <input type="number" id="lugares" min="1" max="10" placeholder="¿Cuántos estudiantes aceptas?">
      </div>

      <div class="campo">
        <label for="contacto">Contacto de la empresa contratante</label>
        <input type="email" id="contacto" placeholder="correo@empresa.com">
      </div>

      <button class="btn btn-primary btn-block" onclick="publicar()">Publicar estadía</button>
      <p id="mensaje" role="status" aria-live="polite"></p>
      <a href="index.html" class="volver">← Volver al inicio</a>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    function publicar(){
      const puesto = document.getElementById('puesto').value.trim();
      const descripcion = document.getElementById('descripcion').value.trim();
      const lugares = document.getElementById('lugares').value.trim();
      const contacto = document.getElementById('contacto').value.trim();
      const mensaje = document.getElementById('mensaje');
      mensaje.className = '';

      if(!puesto || !descripcion || !lugares || !contacto){
        mensaje.classList.add('mensaje-error');
        mensaje.textContent = 'Por favor completa todos los campos.';
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(contacto)){
        mensaje.classList.add('mensaje-error');
        mensaje.textContent = 'El correo que ingresaste no es válido.';
        return;
      }
      mensaje.classList.add('mensaje-exito');
      mensaje.textContent = '¡Estadía publicada exitosamente!';
    }
  </script>
</body>
</html>
