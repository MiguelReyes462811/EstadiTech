<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro - EstadiTech</title>
    <link rel="stylesheet" href="estilos.css" />
</head>
<body>

    <header class="site-header">
        <div class="logos">
            <img src="logoutzac.png" alt="Logo UTZAC">
            <img src="estaditechlogo.png" alt="Logo EstadiTech">
        </div>
        <button class="nav-toggle" aria-label="Abrir menú" aria-expanded="false"><span></span></button>
        <nav class="site-nav">
            <a href="index.html">Inicio</a>
            <a href="vacantes.html">Vacantes</a>
            <a href="publicar.html">Publicar estadía</a>
            <a href="progreso.html">Progreso</a>
            <a href="login.html">Login</a>
            <a href="registro.html" class="nav-cta">Registrarme</a>
        </nav>
    </header>

    <div class="slogan"><span>¡Te ayudamos con tu trayectoria estudiantil!</span></div>

    <main class="centrado">
        <div class="card card-ancha">
            <div class="pagina-header" style="margin-bottom:20px;">
                <h1 style="font-size:26px;">Crear cuenta</h1>
                <p>Regístrate para acceder a EstadiTech</p>
            </div>

            <div class="form-grid">
                <div class="full campo">
                    <label for="tipo">¿Cuál es tu rol?</label>
                    <select id="tipo" onchange="cambiarFormulario()">
                        <option value="alumno">Alumno</option>
                        <option value="empresa">Empresa</option>
                        <option value="direccion_carrera">Director@ de carrera</option>
                        <option value="vinculacion">Área de vinculación</option>
                    </select>
                </div>
            </div>

            <!-- Campos para alumnos -->
            <div id="camposAlumno">
                <div class="form-grid">
                    <div class="campo">
                        <label for="correoAlumno">Correo institucional</label>
                        <input type="email" id="correoAlumno" placeholder="tucorreo@utzac.edu.mx">
                    </div>
                    <div class="campo">
                        <label for="passwordAlumno">Contraseña</label>
                        <input type="password" id="passwordAlumno" placeholder="Contraseña">
                    </div>
                    <div class="campo">
                        <label for="nombreAlumno">Nombre(s)</label>
                        <input type="text" id="nombreAlumno" placeholder="Tu nombre">
                    </div>
                    <div class="campo">
                        <label for="apellidosAlumno">Apellidos</label>
                        <input type="text" id="apellidosAlumno" placeholder="Tus apellidos">
                    </div>
                    <div class="campo">
                        <label for="carreraAlumno">Carrera</label>
                        <select id="carreraAlumno">
                            <option value="administracion">Administración de empresas</option>
                            <option value="agricultura">Agricultura</option>
                            <option value="contaduria">Contaduría</option>
                            <option value="educacion">Educación</option>
                            <option value="energia">Energía y Desarrollo Sostenible</option>
                            <option value="fisioterapia">Fisioterapia</option>
                            <option value="industrial">Ingeniería Industrial</option>
                            <option value="mantenimiento">Mantenimiento Industrial</option>
                            <option value="mecatronica">Mecatrónica</option>
                            <option value="mineria">Minería</option>
                            <option value="mercadotecnia">Negocios y Mercadotecnia</option>
                            <option value="TI">Tecnologías de la Información</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label for="especialidad">Especialidad</label>
                        <input type="text" id="especialidad" placeholder="Tu especialidad (opcional)">
                    </div>
                    <div class="campo">
                        <label for="licencias">Licencias</label>
                        <input type="text" id="licencias" placeholder="Ej. Licencia de conducir, AWS">
                    </div>
                    <div class="campo">
                        <label for="certificaciones">Certificaciones</label>
                        <input type="text" id="certificaciones" placeholder="Ej. CCNA, Microsoft">
                    </div>
                    <div class="full campo">
                        <label for="idiomas">Idiomas</label>
                        <input type="text" id="idiomas" placeholder="Ej. Español, Inglés">
                    </div>
                    <div class="full campo">
                        <label for="habilidades">Habilidades</label>
                        <textarea id="habilidades" placeholder="Describe tus habilidades (opcional)"></textarea>
                    </div>
                    <div class="full campo">
                        <label for="cv">Subir CV</label>
                        <input type="file" id="cv" accept=".pdf,.doc,.docx">
                    </div>
                </div>
            </div>

            <!-- Campos para empresas -->
            <div id="camposEmpresa" class="oculto">
                <div class="form-grid">
                    <div class="campo">
                        <label for="correoEmpresa">Correo</label>
                        <input type="email" id="correoEmpresa" placeholder="correo@empresa.com">
                    </div>
                    <div class="campo">
                        <label for="passwordEmpresa">Contraseña</label>
                        <input type="password" id="passwordEmpresa" placeholder="Contraseña">
                    </div>
                    <div class="campo">
                        <label for="nombreEmpresa">Nombre(s) del responsable</label>
                        <input type="text" id="nombreEmpresa" placeholder="Nombre del responsable">
                    </div>
                    <div class="campo">
                        <label for="apellidosEmpresa">Apellidos del responsable</label>
                        <input type="text" id="apellidosEmpresa" placeholder="Apellidos del responsable">
                    </div>
                    <div class="full campo">
                        <label for="nombreEmpresaRazon">Nombre de empresa</label>
                        <input type="text" id="nombreEmpresaRazon" placeholder="Razón social o nombre comercial">
                    </div>
                    <div class="full campo">
                        <label for="carrerasAfines">Carreras afines</label>
                        <input type="text" id="carrerasAfines" placeholder="Ej. TI, Administración">
                    </div>
                    <div class="campo">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" placeholder="Dirección de la empresa">
                    </div>
                    <div class="campo">
                        <label for="numVacantes">Número de vacantes</label>
                        <input type="number" id="numVacantes" min="1" placeholder="¿Cuántas vacantes tienes?">
                    </div>
                    <div class="full campo">
                        <label for="convocatoria">Subir convocatoria</label>
                        <input type="file" id="convocatoria" accept=".pdf,.doc,.docx">
                    </div>
                </div>
            </div>

            <!-- Campos para dirección de carrera -->
            <div id="camposDireccion" class="oculto">
                <div class="form-grid">
                    <div class="campo">
                        <label for="correoDireccion">Correo</label>
                        <input type="email" id="correoDireccion" placeholder="correo@utzac.edu.mx">
                    </div>
                    <div class="campo">
                        <label for="passwordDireccion">Contraseña</label>
                        <input type="password" id="passwordDireccion" placeholder="Contraseña">
                    </div>
                    <div class="campo">
                        <label for="nombreDireccion">Nombre(s) del responsable</label>
                        <input type="text" id="nombreDireccion" placeholder="Nombre del responsable">
                    </div>
                    <div class="campo">
                        <label for="apellidosDireccion">Apellidos del responsable</label>
                        <input type="text" id="apellidosDireccion" placeholder="Apellidos del responsable">
                    </div>
                    <div class="full campo">
                        <label for="carreraAfin">Carrera a su cargo</label>
                        <input type="text" id="carreraAfin" placeholder="Ej. Tecnologías de la Información">
                    </div>
                </div>
            </div>

            <!-- Campos para vinculación -->
            <div id="camposVinculacion" class="oculto">
                <div class="form-grid">
                    <div class="campo">
                        <label for="correoVinculacion">Correo</label>
                        <input type="email" id="correoVinculacion" placeholder="correo@utzac.edu.mx">
                    </div>
                    <div class="campo">
                        <label for="passwordVinculacion">Contraseña</label>
                        <input type="password" id="passwordVinculacion" placeholder="Contraseña">
                    </div>
                    <div class="campo">
                        <label for="nombreVinculacion">Nombre(s) del responsable</label>
                        <input type="text" id="nombreVinculacion" placeholder="Nombre del responsable">
                    </div>
                    <div class="campo">
                        <label for="apellidosVinculacion">Apellidos del responsable</label>
                        <input type="text" id="apellidosVinculacion" placeholder="Apellidos del responsable">
                    </div>
                </div>
            </div>

            <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-primary btn-block" onclick="registrar()">Registrarse</button>
                <p style="text-align:center;">¿Ya tienes cuenta? <a href="login.html"><strong>Inicia sesión aquí</strong></a></p>
                <div id="mensaje" role="status" aria-live="polite"></div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Preselecciona el rol según el parámetro ?tipo= que envía index.html
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const tipo = params.get('tipo');
            const select = document.getElementById('tipo');
            if (tipo && [...select.options].some(o => o.value === tipo)) {
                select.value = tipo;
            }
            cambiarFormulario();
        });

        function cambiarFormulario() {
            const tipo = document.getElementById('tipo').value;
            const secciones = {
                alumno: document.getElementById('camposAlumno'),
                empresa: document.getElementById('camposEmpresa'),
                direccion_carrera: document.getElementById('camposDireccion'),
                vinculacion: document.getElementById('camposVinculacion'),
            };

            Object.entries(secciones).forEach(([clave, el]) => {
                el.classList.toggle('oculto', clave !== tipo);
            });

            document.getElementById('mensaje').textContent = '';
        }

        function validarContrasena(password) {
            if (password.length < 8) return 'La contraseña debe tener al menos 8 caracteres.';
            if (!/[A-Z]/.test(password)) return 'La contraseña debe tener al menos una mayúscula.';
            if (!/[0-9]/.test(password)) return 'La contraseña debe tener al menos un número.';
            return '';
        }

        // Reglas de validación por tipo de cuenta: qué campos son obligatorios
        const CAMPOS_POR_TIPO = {
            alumno: {
                requeridos: ['correoAlumno', 'passwordAlumno', 'nombreAlumno', 'apellidosAlumno'],
                correo: 'correoAlumno',
                password: 'passwordAlumno',
            },
            empresa: {
                requeridos: ['correoEmpresa', 'passwordEmpresa', 'nombreEmpresa', 'apellidosEmpresa', 'nombreEmpresaRazon'],
                correo: 'correoEmpresa',
                password: 'passwordEmpresa',
            },
            direccion_carrera: {
                requeridos: ['correoDireccion', 'passwordDireccion', 'nombreDireccion', 'apellidosDireccion', 'carreraAfin'],
                correo: 'correoDireccion',
                password: 'passwordDireccion',
            },
            vinculacion: {
                requeridos: ['correoVinculacion', 'passwordVinculacion', 'nombreVinculacion', 'apellidosVinculacion'],
                correo: 'correoVinculacion',
                password: 'passwordVinculacion',
            },
        };

        function registrar() {
            const tipo = document.getElementById('tipo').value;
            const mensajeEl = document.getElementById('mensaje');
            mensajeEl.className = '';

            const reglas = CAMPOS_POR_TIPO[tipo];

            const faltante = reglas.requeridos.some(id => !document.getElementById(id).value.trim());
            if (faltante) {
                mensajeEl.classList.add('mensaje-error');
                mensajeEl.textContent = 'Por favor llena todos los campos obligatorios.';
                return;
            }

            const correo = document.getElementById(reglas.correo).value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(correo)) {
                mensajeEl.classList.add('mensaje-error');
                mensajeEl.textContent = 'El correo no es válido.';
                return;
            }

            const password = document.getElementById(reglas.password).value;
            const passErr = validarContrasena(password);
            if (passErr) {
                mensajeEl.classList.add('mensaje-error');
                mensajeEl.textContent = passErr;
                return;
            }

            mensajeEl.classList.add('mensaje-exito');
            mensajeEl.textContent = '¡Cuenta creada exitosamente!';
        }
    </script>
</body>
</html>
