<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EstadiTech</title>
    <link rel="stylesheet" href="estilos.css">
    <style>

        /*barra azul de arriba jaja*/
        header {
            background-color: #2c7be5;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img {
            width: 120px; /* tamaño del logo */
            height: auto;
        }

        .slogan {
            font-size: 18px;
            font-weight: bold;
            animation: mover 6s infinite alternate;
        }

        @keyframes mover {
            0% { transform: translateX(0); }
            50% { transform: translateX(20px); }
            100% { transform: translateX(0); }
        }

        /* Cuadrito del centro */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            text-align: center;
        }

        /* Recuadro del login */
        .login-box {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        .login-box label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: left;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            background-color: #2c7be5;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #1a5bbf;
        }

        #mensaje {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <!-- Barra sup -->
    <header>
        <img src="EstadiTech.png" alt="Logo EstadiTech">
        <div class="slogan">Buscamos talentos UTZAC y los canalizamos con empresas</div>
    </header>

    <!-- para correo y passw -->
    <main>
        <div class="login-box">
            <h1>Iniciar sesión</h1>

            <label for="correo">Correo:</label>
            <input type="email" id="correo" placeholder="tucorreo@gmail.com">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Contraseña">

            <button onclick="login()">Entrar</button>

            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>

            <p id="mensaje"></p>
        </div>
    </main>

    <script>
        function login() {
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            if (!correo || !password) {
                document.getElementById('mensaje').textContent = 'Por favor llena todos los campos.';
                return;
            }

            if (!correo.includes('@')) {
                document.getElementById('mensaje').textContent = 'El correo no es válido.';
                return;
            }

            if (password.length < 8) {
                document.getElementById('mensaje').textContent = 'La contraseña debe tener al menos 8 caracteres.';
                return;
            }

            if (!/[A-Z]/.test(password)) {
                document.getElementById('mensaje').textContent = 'La contraseña debe tener al menos una mayúscula.';
                return;
            }

            if (!/[0-9]/.test(password)) {
                document.getElementById('mensaje').textContent = 'La contraseña debe tener al menos un número.';
                return;
            }

            document.getElementById('mensaje').textContent = '¡Bienvenido!';
        }
    </script>

</body>
</html>
