<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstadiTech</title>
    <link rel="stylesheet" href="estilos.css">
    <style>

        header {
            background-color: #2c7be5;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img {
            height:80px;
        }

        .slogan {
            font-size: 15px;
            font-weight: bold;
            animation: mover 6s infinite alternate;
        }

        @keyframes mover {
            0% { transform: translateX(0); }
            50% { transform: translateX(20px); }
            100% { transform: translateX(0); }
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            text-align: center;
        }

        .roles {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        .roles button {
            margin: 10px;
            width: 80%;
        }
    </style>
</head>
<body>

    <header>
        <img src="EstadiTech.png" alt="Logo EstadiTech" width="150" height="450">

        <div class="slogan">Estamos buscando talentos UTZAC ¡Aprovecha!</div>
    </header>

    <main>
        <h1>EstadiTech</h1>
        <p>Conectando talento UTZAC con oportunidades</p>
        <br><br>

        <div class="roles">
            <h2>¿Cuál es tu rol?</h2>
            <button onclick="window.location.href='registro.html?tipo=alumno'">Soy estudiante</button>
            <button onclick="window.location.href='registro.html?tipo=empresa'">Soy empresa</button>
        </div>
        <br><br>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
    </main>

</body>
</html>
